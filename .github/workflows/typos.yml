name: typos

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typos:
    name: Spell-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run typos
        # Rust-based, very low false-positive rate. Add overrides in .typos.toml
        # if needed. Pinned to a specific tag.
        uses: crate-ci/typos@v1.34.0
