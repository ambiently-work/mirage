name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish @ambiently-work/vfs
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build TypeScript
        run: bunx tsc -b --force

      - name: Publish to npmjs (OIDC)
        run: npm publish --provenance --access public

      - name: Configure npmrc for GitHub Packages
        run: |
          {
            echo "@ambiently-work:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}"
          } > .npmrc
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry=https://npm.pkg.github.com

  notify-consumers:
    name: Notify consumers of release
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch vfs-released to faux
        env:
          GH_TOKEN: ${{ secrets.CONSUMER_DISPATCH_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          PACKAGE: "@ambiently-work/vfs"
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/ambiently-work/faux/dispatches \
            -f event_type=vfs-released \
            -F "client_payload[version]=$VERSION" \
            -F "client_payload[tag]=$TAG" \
            -F "client_payload[package]=$PACKAGE"

      - name: Dispatch vfs-released to agent-sdk
        env:
          GH_TOKEN: ${{ secrets.CONSUMER_DISPATCH_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          PACKAGE: "@ambiently-work/vfs"
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/ambiently-work/agent-sdk/dispatches \
            -f event_type=vfs-released \
            -F "client_payload[version]=$VERSION" \
            -F "client_payload[tag]=$TAG" \
            -F "client_payload[package]=$PACKAGE"
