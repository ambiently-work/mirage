name: Trivy

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly run picks up newly disclosed CVEs.
    - cron: "23 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: Filesystem & misconfig scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      # Bumping this is the only edit needed to upgrade Trivy.
      TRIVY_VERSION: "0.70.0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Trivy
        run: |
          set -euo pipefail
          url="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSL "$url" | sudo tar xzf - -C /usr/local/bin trivy
          trivy --version

      - name: Trivy filesystem scan (CVEs in deps)
        run: |
          trivy fs . \
            --format sarif \
            --output trivy-fs.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            --exit-code 0

      - name: Trivy config scan (IaC / workflow misconfig)
        run: |
          trivy config . \
            --format sarif \
            --output trivy-config.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 0

      - name: Upload filesystem SARIF
        uses: github/codeql-action/upload-sarif@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload config SARIF
        uses: github/codeql-action/upload-sarif@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
